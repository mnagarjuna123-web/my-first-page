<!DOCTYPE html>
<html>
<head>
    <title>My First Page</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            gap: 20px;
        }
        h1 {
            color: blue;
            text-align: center;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Hello world! It's my first page</h1>
    <button onclick="showAlert()">Click Me</button>

    <script>
        function showAlert() {
            alert("Button clicked!");
        }
    </script>
</body>
</html>
